    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-CimInstance
        [-InputObject] <CimInstance>
        [-ResourceUri <Uri>]
        [-ComputerName <String[]>]
        [-OperationTimeoutSec <UInt32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CimInstanceComputerSet
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-CimInstance
        [-InputObject] <CimInstance>
        -CimSession <CimSession[]>
        [-ResourceUri <Uri>]
        [-OperationTimeoutSec <UInt32>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: CimInstanceSessionSet
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-CimInstance
        [[-Namespace] <String>]
        [-Query] <String>
        -CimSession <CimSession[]>
        [-OperationTimeoutSec <UInt32>]
        [-QueryDialect <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: QuerySessionSet
  isDefault: false
- syntax: |-
    ```Syntax
    Remove-CimInstance
        [[-Namespace] <String>]
        [-Query] <String>
        [-ComputerName <String[]>]
        [-OperationTimeoutSec <UInt32>]
        [-QueryDialect <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: QueryComputerSet
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    You can't pipe objects to this cmdlet.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns no output.
examples:
- title: 'Example 1: Remove the CIM instance'
  description: |-
    This example use the **Query** parameter to remove CIM instances from the class named
    **Win32_Environment** that start with the character string **testvar** .

    ```powershell
    Remove-CimInstance -Query 'Select * from Win32_Environment where name LIKE "testvar%"'
    ```
- title: 'Example 2: Remove the CIM instance using CIM instance object'
  description: |-
    This example retrieves the CIM instance objects filtered by the **Query** parameter and stores them
    in variable named `$var` using the `Get-CimInstance` cmdlet. The contents of the variable are then
    passed to the `Remove-CimInstance` cmdlet, which removes the CIM instances.

    ```powershell
    notepad.exe
    $var = Get-CimInstance -Query 'Select * from Win32_Process where name LIKE "notepad%"'
    Remove-CimInstance -InputObject $var
    ```

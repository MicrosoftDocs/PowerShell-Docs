syntaxes:
- syntax: |-
    ```Syntax
    Rename-Item
        [-Path] <String>
        [-NewName] <String>
        [-Force]
        [-PassThru]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: true
- syntax: |-
    ```Syntax
    Rename-Item
        [-NewName] <String>
        -LiteralPath <String>
        [-Force]
        [-PassThru]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByLiteralPath
  isDefault: false

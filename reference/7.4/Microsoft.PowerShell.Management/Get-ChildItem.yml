syntaxes:
- syntax: |-
    ```Syntax
    Get-ChildItem
        [[-Path] <string[]>]
        [[-Filter] <string>]
        [-Include <string[]>]
        [-Exclude <string[]>]
        [-Recurse]
        [-Depth <uint>]
        [-Force]
        [-Name]
        [<CommonParameters>]
    ```
  parameterSetName: Items
  isDefault: true
- syntax: |-
    ```Syntax
    Get-ChildItem
        [[-Filter] <string>]
        -LiteralPath <string[]>
        [-Include <string[]>]
        [-Exclude <string[]>]
        [-Recurse]
        [-Depth <uint>]
        [-Force]
        [-Name]
        [<CommonParameters>]
    ```
  parameterSetName: LiteralItems
  isDefault: false

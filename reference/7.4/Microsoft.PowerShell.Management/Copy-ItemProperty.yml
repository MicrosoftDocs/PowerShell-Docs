syntaxes:
- syntax: |-
    ```Syntax
    Copy-ItemProperty
        [-Path] <String[]>
        [-Name] <String>
        [-Destination] <String>
        [-PassThru]
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-
    ```Syntax
    Copy-ItemProperty
        [-Name] <String>
        [-Destination] <String>
        -LiteralPath <String[]>
        [-PassThru]
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: LiteralPath
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a string that contains a path to this cmdlet.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    By default, this cmdlet returns no output.
- name: <xref href="System.Management.Automation.PSCustomObject" data-throw-if-not-resolved="False" />
  description: |-
    When you use the **PassThru** parameter, this cmdlet returns a **PSCustomObject** representing the
    copied item property.
examples:
- title: 'Example 1: Copy a property from a registry key to another registry key'
  description: |-
    This command copies the property named "MyProperty" from the "MyApplication" registry key to the
    "MyApplicationRev2" registry key.

    ```powershell
    Copy-ItemProperty -Path "MyApplication" -Destination "HKLM:\Software\MyApplicationRev2" -Name "MyProperty"
    ```

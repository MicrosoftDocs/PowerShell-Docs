        [-Force]
        [-NoWait]
        [-PassThru]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: true

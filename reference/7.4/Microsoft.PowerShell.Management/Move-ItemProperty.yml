syntaxes:
- syntax: |-
    ```Syntax
    Move-ItemProperty
        [-Path] <String[]>
        [-Name] <String[]>
        [-Destination] <String>
        [-PassThru]
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-

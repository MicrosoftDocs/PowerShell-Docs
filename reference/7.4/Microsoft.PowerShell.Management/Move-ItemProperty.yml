    Move-ItemProperty
        [-Name] <String[]>
        [-Destination] <String>
        -LiteralPath <String[]>
        [-PassThru]
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]

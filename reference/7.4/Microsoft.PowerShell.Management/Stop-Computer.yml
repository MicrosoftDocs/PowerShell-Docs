syntaxes:
- syntax: |-
    ```Syntax
    Stop-Computer
        [[-ComputerName] <String[]>]
        [[-Credential] <PSCredential>]
        [-WsmanAuthentication <String>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: All

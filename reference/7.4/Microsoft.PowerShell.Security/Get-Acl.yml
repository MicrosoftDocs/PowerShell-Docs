    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByLiteralPath
      position: Named
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the path to a resource. `Get-Acl` gets the security descriptor of the resource indicated
      by the path. Wildcards are permitted. If you omit the **Path** parameter, `Get-Acl` gets the
      security descriptor of the current directory.

      The parameter name ("Path") is optional.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPath
      position: "1"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: true

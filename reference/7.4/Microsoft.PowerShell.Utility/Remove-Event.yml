syntaxes:
- syntax: |-
    ```Syntax
    Remove-Event
        [-SourceIdentifier] <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: BySource
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-Event
        [-EventIdentifier] <Int32>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]

### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Utility.Import-PowerShellDataFile
name: Import-PowerShellDataFile
module: Microsoft.PowerShell.Utility
isPreview: false
summary: |-
  Imports values from a `.psd1` file without invoking its contents.
description: |-
  The `Import-PowerShellDataFile` cmdlet safely imports key-value pairs from hashtables defined in a
  `.psd1` file. The values could be imported using `Invoke-Expression` on the contents of the file.
  However, `Invoke-Expression` runs any code contained in the file. This could produce unwanted
  results or execute unsafe code. `Import-PowerShellDataFile` imports the data without invoking the
  code. By default there is a 500 key limit, but this can be bypassed with the **SkipLimitCheck**
  switch.
parameters:
  cmdletParameters:
  - name: LiteralPath
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The path to the file being imported. All characters in the path are treated as literal values.
      Wildcard characters aren't processed.
    aliases:
    - PSPath
    - LP
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByLiteralPath
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The path to the file being imported. Wildcards are allowed but only the first matching file is
      imported.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPath
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: true
  - name: SkipLimitCheck
    type: <xref href="Switch" data-throw-if-not-resolved="False" />
    description: |-
      By default `Import-PowerShellDataFile` imports only 500 keys from a `.psd1` file. Use
      **SkipLimitCheck** to import more than 500 keys.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: All
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Import-PowerShellDataFile
        [-Path] <String[]>
        [-SkipLimitCheck]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: true
- syntax: |-
    ```Syntax
    Import-PowerShellDataFile
        [-LiteralPath] <String[]>
        [-SkipLimitCheck]
        [<CommonParameters>]
    ```
  parameterSetName: ByLiteralPath
  isDefault: false
outputs:
- name: <xref href="System.Collections.Hashtable" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns the data from the file as a hash table.
examples:
- title: 'Example 1: Retrieve values from PSD1'
  description: |-
    This example retrieves the key-value pairs stored in the hashtable kept inside the
    `Configuration.psd1` file. `Get-Content` is used to show the contents of the `Configuration.psd1`
    file.

    ```powershell
    Get-Content .\Configuration.psd1
    $config = Import-PowerShellDataFile .\Configuration.psd1
    $config.AllNodes
    ```

    ```Output
    @{
        AllNodes = @(
            @{
                NodeName = 'DSC-01'
            }
            @{
                NodeName = 'DSC-02'
            }
        )
    }

    Name                           Value
    ----                           -----
    NodeName                       DSC-01
    NodeName                       DSC-02
    ```

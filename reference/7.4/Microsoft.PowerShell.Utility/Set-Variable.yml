syntaxes:
- syntax: |-
    ```Syntax
    Set-Variable
        [-Name] <String[]>
        [[-Value] <Object>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Description <String>]
        [-Option <ScopedItemOptions>]
        [-Force]
        [-Visibility <SessionStateEntryVisibility>]
        [-PassThru]
        [-Scope <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true

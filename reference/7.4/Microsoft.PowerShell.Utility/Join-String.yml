syntaxes:
- syntax: |-
    ```Syntax
    Join-String
        [[-Property] <PSPropertyExpression>]
        [[-Separator] <String>]
        [-OutputPrefix <String>]
        [-OutputSuffix <String>]
        [-UseCulture]
        [-InputObject <PSObject[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Join-String
        [[-Property] <PSPropertyExpression>]
        [[-Separator] <String>]
        [-OutputPrefix <String>]
        [-OutputSuffix <String>]
        [-SingleQuote]
        [-UseCulture]
        [-InputObject <PSObject[]>]
        [<CommonParameters>]
    ```
  parameterSetName: SingleQuote
  isDefault: false
- syntax: |-

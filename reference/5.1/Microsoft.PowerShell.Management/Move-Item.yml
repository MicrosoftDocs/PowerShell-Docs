syntaxes:
- syntax: |-
    ```Syntax
    Move-Item
        [-Path] <String[]>
        [[-Destination] <String>]
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-PassThru]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [-UseTransaction]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-
    ```Syntax
    Move-Item
        [[-Destination] <String>]
        -LiteralPath <String[]>
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-PassThru]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [-UseTransaction]
        [<CommonParameters>]
    ```
  parameterSetName: LiteralPath
  isDefault: false

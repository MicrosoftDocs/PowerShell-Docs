syntaxes:
- syntax: |-
    ```Syntax
    Copy-ItemProperty
        [-Path] <String[]>
        [-Name] <String>
        [-Destination] <String>
        [-PassThru]
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [-UseTransaction]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-
    ```Syntax
    Copy-ItemProperty
        [-Name] <String>
        [-Destination] <String>
        -LiteralPath <String[]>
        [-PassThru]
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]

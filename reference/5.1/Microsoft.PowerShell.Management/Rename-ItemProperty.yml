syntaxes:
- syntax: |-
    ```Syntax
    Rename-ItemProperty
        [-Path] <String>
        [-Name] <String>
        [-NewName] <String>
        [-PassThru]
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [-UseTransaction]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-
    ```Syntax
    Rename-ItemProperty
        [-Name] <String>
        [-NewName] <String>
        -LiteralPath <String>
        [-PassThru]
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [-UseTransaction]
        [<CommonParameters>]
    ```
  parameterSetName: LiteralPath
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a string that contains a path, but not a literal path, to this cmdlet.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    By default, this cmdlet returns no output.
- name: <xref href="System.Management.Automation.PSCustomObject" data-throw-if-not-resolved="False" />
  description: |-
    When you use the **PassThru** parameter, this cmdlet returns a **PSCustomObject** representing the
    renamed item property.
examples:
- title: 'Example 1: Rename a registry entry'
  description: |-
    This command renames the config registry entry that is contained in the "HKEY_LOCAL_MACHINE\Software\SmpApplication" key to "oldconfig".

    ```powershell
    Rename-ItemProperty -Path HKLM:\Software\SmpApplication -Name config -NewName oldconfig
    ```

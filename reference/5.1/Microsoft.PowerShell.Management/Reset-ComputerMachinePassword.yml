### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Management.Reset-ComputerMachinePassword
name: Reset-ComputerMachinePassword
module: Microsoft.PowerShell.Management
isPreview: false
summary: |-
  Resets the machine account password for the computer.
description: |-
  The `Reset-ComputerMachinePassword` cmdlet changes the computer account password that the computers
  use to authenticate to the domain controllers in the domain. You can use it to reset the password of
  the local computer.
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="System.Management.Automation.PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a user account that has permission to perform this action. The default is the current
      user.

      Type a user name, such as User01 or Domain01\User01, or enter a **PSCredential** object, such as one
      generated by the `Get-Credential` cmdlet. If you type a user name, this cmdlet prompts you for a
      password.

      This parameter was introduced in Windows PowerShell 3.0.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Server
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of a domain controller to use when this cmdlet sets the computer account
      password.

      This parameter is optional. If you omit this parameter, a domain controller is chosen to service the
      command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,

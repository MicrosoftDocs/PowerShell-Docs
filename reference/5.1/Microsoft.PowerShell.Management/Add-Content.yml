syntaxes:
- syntax: |-
    ```Syntax
    Add-Content
        [-Path] <string[]>
        [-Value] <Object[]>
        [-PassThru]
        [-Filter <string>]
        [-Include <string[]>]
        [-Exclude <string[]>]
        [-Force]
        [-Credential <pscredential>]
        [-WhatIf]
        [-Confirm]
        [-UseTransaction]
        [-NoNewline]
        [-Encoding <FileSystemCmdletProviderEncoding>]
        [-Stream <string>]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-
    ```Syntax
    Add-Content
        [-Value] <Object[]>
        -LiteralPath <string[]>
        [-PassThru]
        [-Filter <string>]
        [-Include <string[]>]
        [-Exclude <string[]>]
        [-Force]
        [-Credential <pscredential>]
        [-WhatIf]
        [-Confirm]
        [-UseTransaction]
        [-NoNewline]
        [-Encoding <FileSystemCmdletProviderEncoding>]
        [-Stream <string>]
        [<CommonParameters>]
    ```
  parameterSetName: LiteralPath
  isDefault: false

syntaxes:
- syntax: |-
    ```Syntax
    New-LocalUser
        [-Name] <String>
        -Password <SecureString>
        [-AccountExpires <DateTime>]
        [-AccountNeverExpires]
        [-Description <String>]
        [-Disabled]
        [-FullName <String>]
        [-PasswordNeverExpires]
        [-UserMayNotChangePassword]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Password
  isDefault: true
- syntax: |-
    ```Syntax
    New-LocalUser
        [-Name] <String>
        [-AccountExpires <DateTime>]
        [-AccountNeverExpires]
        [-Description <String>]
        [-Disabled]
        [-FullName <String>]
        [-NoPassword]
        [-UserMayNotChangePassword]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NoPassword
  isDefault: false

### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.LocalAccounts.Get-LocalGroup
name: Get-LocalGroup
module: Microsoft.PowerShell.LocalAccounts
isPreview: false
summary: |-
  Gets the local security groups.
description: |-
  The `Get-LocalGroup` cmdlet gets local security groups in Security Account Manager.
  This cmdlet gets default built-in groups and local security groups that you create.

  > [!NOTE]
  > The Microsoft.PowerShell.LocalAccounts module is not available in 32-bit PowerShell on a 64-bit
  > system.
notes: |-
  Windows PowerShell includes the following aliases for `Get-LocalGroup`:

  - `glg`

  The **PrincipalSource** property is a property on **LocalUser**, **LocalGroup**, and
  **LocalPrincipal** objects that describes the source of the object. The possible sources are as
  follows:

  - Local
  - Active Directory
  - Microsoft Entra group
  - Microsoft Account

  **PrincipalSource** is supported only by Windows 10, Windows Server 2016, and later versions of the
  Windows operating system. For earlier versions, the property is blank.
parameters:
  cmdletParameters:
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of security groups that this cmdlet gets. You can use the wildcard
      character.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Default
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SID
    type: <xref href="System.Security.Principal.SecurityIdentifier" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of security IDs (SIDs) of security groups that this cmdlet gets.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: SecurityIdentifier
      position: "0"
      isRequired: false
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-LocalGroup
        [[-Name] <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Get-LocalGroup
        [[-SID] <SecurityIdentifier[]>]
        [<CommonParameters>]
    ```
  parameterSetName: SecurityIdentifier
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a string to this cmdlet.
- name: <xref href="System.Security.Principal.SecurityIdentifier" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a SID to this cmdlet.
outputs:
- name: <xref href="System.Management.Automation.SecurityAccountsManager.LocalGroup" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns a local group.
examples:
- title: 'Example 1: Get the Administrators group'
  description: |-
    ```powershell
    Get-LocalGroup -Name "Administrators"
    ```

    This command gets the local Administrators group. The command displays properties of the group in
    the console.

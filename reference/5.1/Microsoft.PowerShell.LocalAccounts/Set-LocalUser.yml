syntaxes:
- syntax: |-
    ```Syntax
    Set-LocalUser
        [-Name] <String>
        [-AccountExpires <DateTime>]
        [-AccountNeverExpires]
        [-Description <String>]
        [-FullName <String>]
        [-Password <SecureString>]
        [-PasswordNeverExpires <Boolean>]
        [-UserMayChangePassword <Boolean>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Set-LocalUser
        [-InputObject] <LocalUser>
        [-AccountExpires <DateTime>]
        [-AccountNeverExpires]
        [-Description <String>]
        [-FullName <String>]
        [-Password <SecureString>]
        [-PasswordNeverExpires <Boolean>]
        [-UserMayChangePassword <Boolean>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
- syntax: |-
    ```Syntax
    Set-LocalUser
        [-SID] <SecurityIdentifier>
        [-AccountExpires <DateTime>]
        [-AccountNeverExpires]
        [-Description <String>]
        [-FullName <String>]
        [-Password <SecureString>]
        [-PasswordNeverExpires <Boolean>]
        [-UserMayChangePassword <Boolean>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SecurityIdentifier
  isDefault: false
inputs:

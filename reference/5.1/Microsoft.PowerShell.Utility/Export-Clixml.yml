syntaxes:
- syntax: |-
    ```Syntax
    Export-Clixml
        [-Path] <String>
        -InputObject <PSObject>
        [-Depth <Int32>]
        [-Force]
        [-NoClobber]
        [-Encoding <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: true
- syntax: |-
    ```Syntax
    Export-Clixml
        -LiteralPath <String>
        -InputObject <PSObject>
        [-Depth <Int32>]
        [-Force]
        [-NoClobber]
        [-Encoding <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByLiteralPath
  isDefault: false

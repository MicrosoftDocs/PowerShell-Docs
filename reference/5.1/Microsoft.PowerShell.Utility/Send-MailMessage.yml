syntaxes:
- syntax: |-
    ```Syntax
    Send-MailMessage
        [-To] <string[]>
        [-Subject] <string>
        [[-Body] <string>]
        [[-SmtpServer] <string>]
        -From <string>
        [-Attachments <string[]>]
        [-Bcc <string[]>]
        [-BodyAsHtml]
        [-Encoding <Encoding>]
        [-Cc <string[]>]
        [-DeliveryNotificationOption <DeliveryNotificationOptions>]
        [-Priority <MailPriority>]
        [-Credential <pscredential>]
        [-UseSsl]
        [-Port <int>]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: false

### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Core.Enable-ExperimentalFeature
name: Enable-ExperimentalFeature
module: Microsoft.PowerShell.Core
isPreview: false
summary: |-
  Enable an experimental feature on startup of new instance of PowerShell.
description: |-
  The `Enable-ExperimentalFeature` cmdlet enables experimental features by adding the named
  experimental features to the `powershell.config.json` settings file read on PowerShell startup.

  This cmdlet was introduced in PowerShell 6.2.

  > [!NOTE]
  > Any changes to experimental feature state only takes effect on restart of PowerShell
notes: |-
  Changes to state of an experimental feature only take effect on restart of PowerShell.
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The name or names of the experimental features to enable.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="System.Management.Automation.Configuration.ConfigScope" data-throw-if-not-resolved="False" />
    description: |-
      Determines which `powershell.config.json` to update whether it affects all users or
      just the current user.
    acceptedValues:
    - AllUsers
    - CurrentUser
    defaultValue: CurrentUser
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Enable-ExperimentalFeature
        [-Name] <String[]>
        [-Scope <ConfigScope>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.Management.Automation.ExperimentalFeature" data-throw-if-not-resolved="False" />
  description: |-
    Pipe instances of ExperimentalFeature from `Get-ExperimentalFeature` cmdlet to enable.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns no output.
examples:
- title: 'Example 1: Enable an experimental feature'
  description: |-
    In this example, if this experimental feature was previously disabled, then the `powershell.config.json`
    file is updated for the user to enable that feature once PowerShell is restarted.
    Upon success nothing is output to the pipeline and only a warning message is displayed.

    ```powershell
    Enable-ExperimentalFeature PSImplicitRemotingBatching
    ```

    ```Output
    WARNING: Enabling and disabling experimental features do not take effect until next start of PowerShell.
    ```

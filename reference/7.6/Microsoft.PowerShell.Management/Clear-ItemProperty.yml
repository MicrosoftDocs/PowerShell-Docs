    Clear-ItemProperty
        [-Path] <String[]>
        [-Name] <String>
        [-PassThru]
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]

syntaxes:
- syntax: |-
    ```Syntax
    New-Service
        [-Name] <String>
        [-BinaryPathName] <String>
        [-DisplayName <String>]
        [-Description <String>]
        [-SecurityDescriptorSddl <String>]
        [-StartupType <ServiceStartupType>]
        [-Credential <PSCredential>]
        [-DependsOn <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    You can't pipe objects to this cmdlet.
outputs:
- name: <xref href="System.ServiceProcess.ServiceController" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns an object representing the new service.
examples:
- title: 'Example 1: Create a service'
  description: |-
    ```powershell
    New-Service -Name "TestService" -BinaryPathName 'C:\WINDOWS\System32\svchost.exe -k netsvcs'
    ```

    This command creates a service named TestService.
- title: 'Example 2: Create a service that includes description, startup type, and display name'
  description: |-
    ```powershell
    $params = @{
      Name = "TestService"
      BinaryPathName = 'C:\WINDOWS\System32\svchost.exe -k netsvcs'
      DependsOn = "NetLogon"
      DisplayName = "Test Service"
      StartupType = "Manual"
      Description = "This is a test service."
    }
    New-Service @params
    ```

    This command creates a service named TestService. It uses the parameters of `New-Service` to specify
    a description, startup type, and display name for the new service.
- title: 'Example 3: View the new service'
  description: |-
    ```powershell
    Get-CimInstance -ClassName Win32_Service -Filter "Name='testservice'"
    ```

    ```Output
    ExitCode  : 0
    Name      : testservice
    ProcessId : 0
    StartMode : Auto
    State     : Stopped
    Status    : OK
    ```

    This command uses `Get-CimInstance` to get the **Win32_Service** object for the new service. This
    object includes the start mode and the service description.
- title: 'Example 4: Set the SecurityDescriptor of a service when creating.'
  description: |-
    This example adds the **SecurityDescriptor** of the service being created.

    ```powershell
    $SDDL = "D:(A;;CCLCSWRPWPDTLOCRRC;;;SY)(A;;CCDCLCSWRPWPDTLOCRSDRCWDWO;;;BA)(A;;CCLCSWLOCRRC;;;SU)"
    $params = @{
      BinaryPathName = 'C:\WINDOWS\System32\svchost.exe -k netsvcs'
      DependsOn = "NetLogon"
      DisplayName = "Test Service"
      StartupType = "Manual"
      Description = "This is a test service."
      SecurityDescriptorSddl = $SDDL
    }
    New-Service @params
    ```

    The **SecurityDescriptor** is stored in the `$SDDLToSet` variable. The **SecurityDescriptorSddl**
    parameter uses `$SDDL` to set the **SecurityDescriptor** of the new service.

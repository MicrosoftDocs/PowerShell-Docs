  - name: SecurityDescriptorSddl
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the **SecurityDescriptor** for the service in **Sddl** format.
    aliases:
    - sd
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named

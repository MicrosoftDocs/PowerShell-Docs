    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the days in the time span. The default value is 0.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Time
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: End
    type: <xref href="System.DateTime" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the end of a time span. The default value is the current date and time.
    defaultValue: Current date and time
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Date
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Hours

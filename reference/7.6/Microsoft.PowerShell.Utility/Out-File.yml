syntaxes:
- syntax: |-
    ```Syntax
    Out-File
        [-FilePath] <string>
        [[-Encoding] <Encoding>]
        [-Append]
        [-Force]
        [-NoClobber]
        [-Width <int>]
        [-NoNewline]
        [-InputObject <psobject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: true
- syntax: |-
    ```Syntax
    Out-File
        [[-Encoding] <Encoding>]
        -LiteralPath <string>
        [-Append]
        [-Force]
        [-NoClobber]
        [-Width <int>]
        [-NoNewline]
        [-InputObject <psobject>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByLiteralPath
  isDefault: false

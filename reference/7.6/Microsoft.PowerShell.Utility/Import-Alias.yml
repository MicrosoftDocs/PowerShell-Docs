### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Utility.Import-Alias
name: Import-Alias
module: Microsoft.PowerShell.Utility
isPreview: false
summary: |-
  Imports an alias list from a file.
description: |-
  The `Import-Alias` cmdlet imports an alias list from a file.

  Beginning in Windows PowerShell 3.0, as a security feature, `Import-Alias` does not overwrite existing aliases by default.
  To overwrite an existing alias, after assuring that the contents of the alias file is safe, use the **Force** parameter.
notes: |-
  PowerShell includes the following aliases for `Import-Alias`:

  - All platforms:
    - `ipal`
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Allows the cmdlet to import an alias that is already defined or is read only.
      You can use the following command to display information about the currently-defined aliases:

      `Get-Alias | Select-Object Name, Options`

      If the corresponding alias is read-only, it will be displayed in the value of the **Options** property.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LiteralPath
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to a file that includes exported alias information.
      Unlike the **Path** parameter, the value of the **LiteralPath** parameter is used exactly as it is typed.
      No characters are interpreted as wildcards.
      If the path includes escape characters, enclose it in single quotation marks.
      Single quotation marks tell PowerShell not to interpret any characters as escape sequences.
    aliases:
    - PSPath
    - LP
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByLiteralPath
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you are working.
      By default, this cmdlet does not generate any output.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to a file that includes exported alias information.
      Wildcards are allowed but they must resolve to a single name.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ByPath
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: true
  - name: Scope
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the scope into which the aliases are imported.
      The acceptable values for this parameter are:

      - Global
      - Local
      - Script
      - A number relative to the current scope (0 through the number of scopes, where 0 is the current scope and 1 is its parent)

      The default is Local.
      For more information, see [about_Scopes](../Microsoft.PowerShell.Core/About/about_Scopes.md).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Import-Alias
        [-Path] <String>
        [-Scope <String>]
        [-PassThru]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByPath
  isDefault: true
- syntax: |-
    ```Syntax
    Import-Alias
        -LiteralPath <String>
        [-Scope <String>]
        [-PassThru]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ByLiteralPath
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a string that contains a path to this cmdlet.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    By default, this cmdlet returns no output.
- name: <xref href="System.Management.Automation.AliasInfo" data-throw-if-not-resolved="False" />
  description: |-
    When you use the **PassThru** parameter, this cmdlet returns an **AliasInfo** object representing
    the alias.
examples:
- title: 'Example 1: Import aliases from a file'
  description: |-
    ```powershell
    Import-Alias test.txt
    ```

    This command imports alias information from a file named test.txt.

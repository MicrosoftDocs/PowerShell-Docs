### YamlMime:PowerShellCmdlet1
uid: PSDiagnostics.Disable-WSManTrace
name: Disable-WSManTrace
module: PSDiagnostics
isPreview: false
summary: |-
  Stop the WSMan logging session started by Enable-WSManTrace.
description: |-
  > **This cmdlet is only available on the Windows platform.**

  This cmdlet stops the WSMan logging session started by Enable-WSManTrace.

  This cmdlet uses the `Stop-Trace` cmdlet.

  You must run this cmdlet from an elevated PowerShell session.
syntaxes:
- syntax: |-
    ```Syntax
    Disable-WSManTrace
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    You can't pipe objects to this cmdlet.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns no output.
examples:
- title: 'Example 1: Stop a WSMan trace'
  description: |-
    ```powershell
    Disable-WSManTrace
    ```

### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Core.Debug-Job
name: Debug-Job
module: Microsoft.PowerShell.Core
isPreview: false
summary: |-
  Debugs a running background or remote job.
description: |-
  The `Debug-Job` cmdlet lets you debug scripts that are running within jobs. The cmdlet is designed
  to debug PowerShell Workflow jobs, background jobs, and jobs running in remote sessions. `Debug-Job`
  accepts a running job object, name, ID, or instance ID as input, and starts a debugging session on
  the script it is running. The debugger `quit` command stops the job and running script. The `exit`
  command detaches the debugger, and allows the job to continue to run.
parameters:
  cmdletParameters:
  - name: BreakAll
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Allows you to break immediately in the current location when the debugger attaches.

      This parameter was added in PowerShell 7.2.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="System.Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the ID number of a running job. To get the ID number of a job, run the `Get-Job` cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: JobIdParameterSet
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: InstanceId
    type: <xref href="System.Guid" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the instance ID GUID of a running job.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: JobInstanceIdParameterSet
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Job
    type: <xref href="System.Management.Automation.Job" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a running job object. The simplest way to use this parameter is to save the results of a
      `Get-Job` command that returns the running job that you want to debug in a variable, and then
      specify the variable as the value of this parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: JobParameterSet
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a job by the friendly name of the job. When you start a job, you can specify a job name by
      adding the **JobName** parameter, in cmdlets such as `Invoke-Command` and `Start-Job`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: JobNameParameterSet
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Debug-Job
        [-Job] <Job>
        [-BreakAll]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: JobParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Debug-Job
        [-Name] <String>
        [-BreakAll]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: JobNameParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Debug-Job
        [-Id] <Int32>
        [-BreakAll]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: JobIdParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Debug-Job
        [-InstanceId] <Guid>
        [-BreakAll]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: JobInstanceIdParameterSet
  isDefault: false
inputs:
- name: <xref href="System.Management.Automation.RemotingJob" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Debug a job by job ID'
  description: |-
    This command breaks into a running job with an ID of 3.

    ```powershell
    Debug-Job -Id 3
    ```

    ```Output
    Id     Name            PSJobTypeName   State         HasMoreData     Location             Command
    --     ----            -------------   -----         -----------     --------             -------
    3      Job3            RemoteJob       Running       True            PowerShellIx         TestWFDemo1.ps1
              Entering debug mode. Use h or ? for help.

              Hit Line breakpoint on 'C:\TestWFDemo1.ps1:8'

              At C:\TestWFDemo1.ps1:8 char:5
              +     Write-Output -InputObject "Now writing output:"
              +     ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
              [DBG:PowerShellIx]: PS C:\> > list

                  3:
                  4:  workflow SampleWorkflowTest
                  5:  {
                  6:      param ($MyOutput)
                  7:
                  8:*     Write-Output -InputObject "Now writing output:"
                  9:      Write-Output -Input $MyOutput
                 10:
                 11:      Write-Output -InputObject "Get PowerShell process:"
                 12:      Get-Process -Name powershell
                 13:
                 14:      Write-Output -InputObject "Workflow function complete."
                 15:  }
                 16:
                 17:  # Call workflow function
                 18:  SampleWorkflowTest -MyOutput "Hello"
    ```

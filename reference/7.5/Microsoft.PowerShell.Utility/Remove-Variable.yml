    ```Syntax
    Remove-Variable
        [-Name] <String[]>
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Force]
        [-Scope <String>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```

syntaxes:
- syntax: |-
    ```Syntax
    New-Event
        [-SourceIdentifier] <String>
        [[-Sender] <PSObject>]
        [[-EventArguments] <PSObject[]>]
        [[-MessageData] <PSObject>]
        [<CommonParameters>]
    ```
  parameterSetName: Default

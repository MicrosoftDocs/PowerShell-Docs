syntaxes:
- syntax: |-
    ```Syntax
    Set-Date
        [-Date] <DateTime>
        [-DisplayHint <DisplayHintType>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Date
  isDefault: true
- syntax: |-
    ```Syntax
    Set-Date
        [-Adjust] <TimeSpan>
        [-DisplayHint <DisplayHintType>]
        [-WhatIf]

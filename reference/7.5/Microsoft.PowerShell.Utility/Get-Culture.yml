syntaxes:
- syntax: |-
    ```Syntax
    Get-Culture
        [-NoUserOverrides]
        [<CommonParameters>]
    ```
  parameterSetName: CurrentCulture
  isDefault: true
- syntax: |-
    ```Syntax
    Get-Culture
        [-Name <String[]>]
        [-NoUserOverrides]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: false
- syntax: |-
    ```Syntax
    Get-Culture
        [-ListAvailable]
        [<CommonParameters>]

    description: |-
      When using the **Leaf** parameter, `Split-Path` returns only the last item in the path string
      supplied, regardless whether that item is a file or a directory.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: LeafSet

syntaxes:
- syntax: |-
    ```Syntax
    Clear-Item
        [-Path] <String[]>
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Path
  isDefault: true
- syntax: |-
    ```Syntax
    Clear-Item
        -LiteralPath <String[]>
        [-Force]
        [-Filter <String>]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
